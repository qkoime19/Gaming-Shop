<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="player-block">
        <img class="player-avatar" src="assets/player-avatar.svg" alt="Player avatar">
        <div>
          <p class="eyebrow">Skin Store</p>
          <h1>Gaming Shop</h1>
        </div>
      </div>
      <section class="wallet" aria-label="Player wallet">
        <span>Coins</span>
        <strong id="coinCount">1200</strong>
      </section>
    </header>

    <section class="stats-row" aria-label="Shop stats">
      <article>
        <span>Items</span>
        <strong id="productTotal">0</strong>
      </article>
      <article>
        <span>Best Drop</span>
        <strong>Legendary</strong>
      </article>
      <article>
        <span>Owned</span>
        <strong id="inventoryCount">0</strong>
      </article>
    </section>

    <section class="shop-layout">
      <section class="shop-panel" aria-labelledby="shopTitle">
        <div class="section-heading">
          <div>
            <h2 id="shopTitle">Shop</h2>
            <button id="lootBoxButton" class="loot-button" type="button">OPEN LOOT BOX</button>
          </div>
          <p id="shopMessage" class="shop-message" aria-live="polite">Ready for the next purchase.</p>
        </div>

        <div class="shop-controls" aria-label="Shop controls">
          <label class="visually-hidden" for="searchInput">Search items</label>
          <input id="searchInput" type="search" placeholder="Search items">

          <label class="visually-hidden" for="categoryFilter">Category</label>
          <select id="categoryFilter"></select>

          <label class="visually-hidden" for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="default">Featured</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="rarity">Rarity</option>
          </select>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </section>

      <aside class="inventory-panel" aria-labelledby="inventoryTitle">
        <h2 id="inventoryTitle">Inventory</h2>
        <ul id="inventoryList" class="inventory-list"></ul>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
